<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">

    <div class="sidebar-brand">
      <h2>SSMS</h2>
      <p>Student Management System</p>
    </div>

    <div class="sidebar-section">

      <a routerLink="/dashboard" routerLinkActive="active">
        🏠 Dashboard
      </a>

      <a routerLink="/view-student" routerLinkActive="active">
        👨‍🎓 View Students
      </a>

      <a
        routerLink="/add-student"
        routerLinkActive="active">
        ➕ Add Student
      </a>

    </div>

  </aside>

  <!-- Main Content -->
  <main class="main-content">

    <div class="page-eyebrow">
      STUDENT MANAGEMENT
    </div>

    <h1 class="page-title">
      Student Registration
    </h1>

    <div class="form-card">

      <form
        #studentForm="ngForm"
        (ngSubmit)="addStudent()">

        <div class="form-grid">

          <!-- Student Name -->
          <div class="form-group">

            <label>
              Student Name
              <span class="required">*</span>
            </label>

            <input
              type="text"
              name="name"
              [(ngModel)]="student.name"
              (input)="lettersOnly($event)"
              #name="ngModel"
              required
              placeholder="Enter student's full name">

            <small
              class="field-error"
              *ngIf="name.invalid && name.touched">

              Student name is required.

            </small>

          </div>

          <!-- Email -->
          <div class="form-group">

            <label>
              Email Address
              <span class="required">*</span>
            </label>

            <input
              type="email"
              name="email"
              [(ngModel)]="student.email"
              #email="ngModel"
              email
              required
              placeholder="example@email.com">

            <small
              class="field-error"
              *ngIf="email.invalid && email.touched">

              Enter a valid email address.

            </small>

          </div>

          <!-- Phone -->
          <div class="form-group">

            <label>
              Phone Number
              <span class="required">*</span>
            </label>

            <input
              type="text"
              name="phone"
              maxlength="11"
              pattern="[0-9]{11}"
              [(ngModel)]="student.phone"
              (input)="numbersOnly($event)"
              #phone="ngModel"
              required
              placeholder="08012345678">

            <small
              class="field-error"
              *ngIf="phone.invalid && phone.touched">

              Phone number must be exactly 11 digits.

            </small>

          </div>

          <!-- Faculty -->
          <div class="form-group">

            <label>
              Faculty
              <span class="required">*</span>
            </label>

            <select
              name="faculty"
              [(ngModel)]="student.faculty"
              (change)="onFacultyChange()"
              #faculty="ngModel"
              required>

              <option value="">Select Faculty</option>

              <option
                *ngFor="let faculty of getFacultyNames()"
                [value]="faculty">

                {{ faculty }}

              </option>

            </select>

          </div>

          <!-- Course -->
          <div class="form-group">

            <label>
              Course
              <span class="required">*</span>
            </label>

            <select
              name="course"
              [(ngModel)]="student.course"
              #course="ngModel"
              required>

              <option value="">Select Course</option>

              <option
                *ngFor="let c of courses"
                [value]="c">

                {{ c }}

              </option>

            </select>

          </div>

          <!-- Date Registered -->
          <div class="form-group">

            <label>
              Date Registered
              <span class="required">*</span>
            </label>

            <input
              type="date"
              name="dateRegistered"
              [(ngModel)]="student.dateRegistered"
              #dateRegistered="ngModel"
              required>

          </div>

        </div>

        <div class="form-footer">

          <div class="hint">
            All fields marked with * are required.
          </div>

          <div>

            <button
              type="button"
              class="btn btn-secondary"
              (click)="resetForm()">

              Reset

            </button>

            &nbsp;

            <button
              type="submit"
              class="btn btn-primary"
              [disabled]="studentForm.invalid">

              Add Student

            </button>

          </div>

        </div>

      </form>

    </div>

  </main>

</div>
